# ------------------------------------------------------------
# The following values are for the AIQ KXTA backend service.
# ------------------------------------------------------------

replicaCount: 1

# Global container registry settings
# Override these for different environments (ECR, NVCR, etc.)
global:
  registry: ""  # Leave empty to use repository values as-is, or set to override (e.g., "105440091466.dkr.ecr.us-east-1.amazonaws.com")

# Pull secret for the backend/frontend images you build and push to your registry.
# Build them from deploy/Dockerfile and frontend/Dockerfile first (see README → Build the images).
imagePullSecret:
  name: "kx-portal-secret"
  registry: ""  # Set to your container registry (e.g. <account>.dkr.ecr.<region>.amazonaws.com)
  username: ""  # Set to your registry username
  password: ""  # Set to your registry token
  create: true

# NGC registry secret (for NIM images from nvcr.io)
ngcImagePullSecret:
  name: "ngc-secret"
  registry: "nvcr.io"
  username: "$oauthtoken"
  password: ""
  create: true

ngcApiSecret:
  name: "ngc-api"
  password: ""
  create: true

tavilyApiSecret:
  name: "tavily-secret"
  create: true
  password: ""

# Source agent API key secrets (optional; set create: true and fill passwords to use)
firecrawlApiSecret:
  name: "firecrawl-secret"
  create: false
  password: ""

alphavantageApiSecret:
  name: "alphavantage-secret"
  create: false
  password: ""

fredApiSecret:
  name: "fred-secret"
  create: false
  password: ""

# KDB+ API Key Secret (optional, for authenticated KDB+ MCP servers)
kdbApiSecret:
  name: "kdb-secret"
  create: false
  password: ""

# Redis for job tracking (KDB data loader)
# Tag unified to 8.2.1 to match rag2/nv-ingest — single image in airgap mirror.
# KXTA uses basic SET/GET/EXPIRE only (see fastapi_extensions/routes/kdb_data.py) — safe on Redis 8.
redis:
  enabled: true
  image:
    repository: redis
    tag: 8.2.1
    pullPolicy: IfNotPresent

# The image repository and tag for the AIQ KXTA backend service.
# Build from deploy/Dockerfile and push to your registry, then set this repository.
image:
  repository: REPLACE_WITH_REGISTRY/kxta-backend
  tag: "latest"
  pullPolicy: Always

# The service type and port for the main AIQ KXTA backend service
service:
  port: 3838

backendEnvVars:
  INSTRUCT_MODEL_NAME: "meta-llama/llama-3.3-70b-instruct"
  INSTRUCT_MODEL_TEMP: "0.0"
  NEMOTRON_MAX_TOKENS: "5000"
  INSTRUCT_MAX_TOKENS: "20000"
  INSTRUCT_BASE_URL: "http://instruct-llm:8000"
  INSTRUCT_API_KEY: "not-needed"
  NEMOTRON_MODEL_NAME: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  NEMOTRON_MODEL_TEMP: "0.5"
  NEMOTRON_BASE_URL: "http://nim-llm.rag.svc.cluster.local:8000"
  KXTA_APPLY_GUARDRAIL: "false"
  # Per-call async timeout (seconds) for LLM/source-agent operations. Tool-calling source
  # agents (e.g. fundamentals, sec_filings) against hosted NIMs can run several minutes;
  # raise this if a slow-but-healthy source is timing out.
  KXTA_ASYNC_TIMEOUT: "600"
  # Relevancy gating via a NeMo Retriever reranker NIM (one ~1B forward pass per
  # result instead of an LLM-judge generation). Leave empty to use the LLM judge.
  # When deploying next to the RAG blueprint, point at its ranking service, e.g.
  # http://nemoretriever-ranking-ms.<rag-namespace>.svc.cluster.local:8000
  RERANKER_NIM_URL: ""

  RAG_SERVER_URL: "http://rag-server.rag.svc.cluster.local:8081"
  RAG_INGEST_URL: "http://ingestor-server.rag.svc.cluster.local:8082"
  # Source agents (non-secret config)
  SEC_EDGAR_EMAIL: "kxta@example.com"
  # KDB+ MCP Server Configuration.
  # KDB+ is off by default. To turn it on, pick ONE of two modes:
  #   Mode A — connect to your existing KDB-X: set KDB_ENABLED="true" and KDB_MCP_ENDPOINT
  #            to your KDB-X MCP server URL (+ KDB_API_KEY if it requires auth).
  #   Mode B — deploy a test KDB-X + MCP with this blueprint: enable the kdb-x-mcp-server
  #            subchart, which sets KDB_MCP_ENDPOINT to the in-cluster service and
  #            KDB_MCP_INTERNAL="true" (enables the data loader).
  # There is intentionally NO default endpoint — the blueprint must not silently connect
  # to a third-party demo server.
  KDB_ENABLED: "false"
  KDB_USE_NAT_CLIENT: "true"  # Use NAT's native MCP client (requires NAT 1.3.0+)
  KDB_MCP_ENDPOINT: ""        # placeholder — set in Mode A, or auto-set by the subchart in Mode B
  KDB_MCP_INTERNAL: "false"   # "true" only when the MCP server is deployed by this blueprint (Mode B)
  KDB_TIMEOUT: "30"
  # Direct KDB-X DB address for the historical-data LOADER (writes). The MCP endpoint is the
  # read path and is SQL-only / read-only, so bulk loading writes here over q-IPC. Set this to
  # the KDB-X database service (e.g. the kdbx the MCP connects to). Empty = loader writes fail
  # with a clear error rather than silently no-op'ing.
  KDB_DB_HOST: ""
  KDB_DB_PORT: "5000"
  
nim-llm:
  enabled: true
  service:
    name: "instruct-llm"
  image:
      repository: nvcr.io/nim/meta/llama-3.3-70b-instruct
      pullPolicy: IfNotPresent
      tag: "1.15.5"
  resources:
    # FP8 single GPU (TP1): 70B FP8 (~70GB) fits one 96GB RTX PRO 6000 Blackwell.
    # 1 GPU forces FP8 (bf16 ~140GB won't fit). NIM 1.x (TRT-LLM), parity with nemotron.
    limits:
      nvidia.com/gpu: 1
    requests:
      nvidia.com/gpu: 1
  # Configure NIM Model Profile for optimal performance
  env:
    - name: NIM_MODEL_PROFILE
      value: ""  # Empty = auto-select; single 96GB GPU resolves to FP8 TP1
    # 70B FP8 leaves ~26GB for KV on a 96GB card; cap max seq len so it stays
    # comfortable at single-GPU (also avoids the default 131072 over-allocation).
    - name: NIM_MAX_MODEL_LEN
      value: "32768"
  model:
    ngcAPIKey: ""
    name: "meta-llama/llama-3.3-70b-instruct"

# Optional: self-host the Nemotron reasoning model as a second in-chart NIM.
# DISABLED by default. By default `backendEnvVars.NEMOTRON_BASE_URL` points at the
# co-deployed RAG blueprint's nim-llm (which already serves Nemotron), so most
# deployments need nothing here. Enable this ONLY when KXTA must serve Nemotron
# itself — e.g. a standalone or air-gapped install with no RAG NIM to borrow.
# When enabled, also set:
#   backendEnvVars.NEMOTRON_BASE_URL: "http://nemotron-llm:8000/v1"
# and budget a second GPU for it.
nim-llm-nemotron:
  enabled: false
  service:
    name: "nemotron-llm"
  image:
      repository: nvcr.io/nim/nvidia/llama-3.3-nemotron-super-49b-v1.5
      pullPolicy: IfNotPresent
      tag: "1.15.5"
  resources:
    # FP8 single GPU (TP1): 49B FP8 (~50GB) fits one 96GB RTX PRO 6000 Blackwell,
    # leaving ~40GB for KV. 1 GPU forces FP8. Parity with the instruct NIM above.
    limits:
      nvidia.com/gpu: 1
    requests:
      nvidia.com/gpu: 1
  env:
    - name: NIM_MODEL_PROFILE
      value: ""  # Empty = auto-select; single 96GB GPU resolves to FP8 TP1
    - name: NIM_MAX_MODEL_LEN
      value: "32768"
  model:
    ngcAPIKey: ""
    name: "nvidia/llama-3.3-nemotron-super-49b-v1.5"

# -----------------------------------------------------------
# The following values are for the AIQ KXTA frontend service.
# ------------------------------------------------------------

# The frontend application is a React web app. We recommend a NodePort so the frontend will be accessible at <your-node-ip>:3001
frontend:
  enabled: true
  service:
    type: NodePort
    port: 3000
    targetPort: 3000
    nodePort: 30080
  image:
    repository: REPLACE_WITH_REGISTRY/kxta-frontend
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1

# ------------------------------------------------------------
# The following values are optional utility services
# ------------------------------------------------------------

# Enables the Phoenix tracing service
phoenix:
  enabled: true
  image:
    repository: arizephoenix/phoenix
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
# Optional HPA/PDB for the backend (the NIMs themselves are best managed by the
# NVIDIA NIM Operator — see docs/nim-enterprise-roadmap.md).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: ""
podDisruptionBudget:
  enabled: false
  minAvailable: 1
