apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kxta-backend
  template:
    metadata:
      labels:
        app: kxta-backend
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret.name }}
        {{- if .Values.ngcImagePullSecret }}
        - name: {{ .Values.ngcImagePullSecret.name }}
        {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "kxta.fullname" . }}-config
      containers:
        - name: kxta-backend
          command:
            - /bin/bash
            - -c
            - /entrypoint.sh
          volumeMounts:
            - name: config-volume
              mountPath: /app/configs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if .Values.backendEnvVars }}
            {{- range $k, $v := .Values.backendEnvVars }}
            {{- if ne $k "INSTRUCT_API_KEY" }}
            - name: "{{ $k }}"
              value: "{{ $v }}"
            {{- end }}
            {{- end }}
            {{- end }}
            - name: INSTRUCT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NVIDIA_API_KEY
            # Also expose the raw NVIDIA_API_KEY: the hosted NeMo Retriever embedder
            # (kdb_docs query embedding + semantic routing) and other paths read this
            # name directly, not the *_API_KEY aliases above.
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NVIDIA_API_KEY
            - name: NEMOTRON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NVIDIA_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tavilyApiSecret.name }}
                  key: TAVILY_API_KEY
            {{- if .Values.kdbApiSecret.create }}
            - name: KDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kdbApiSecret.name }}
                  key: KDB_API_KEY
            {{- end }}
            {{- if .Values.firecrawlApiSecret.create }}
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.firecrawlApiSecret.name }}
                  key: FIRECRAWL_API_KEY
            {{- end }}
            {{- if .Values.alphavantageApiSecret.create }}
            - name: ALPHAVANTAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.alphavantageApiSecret.name }}
                  key: ALPHAVANTAGE_API_KEY
            {{- end }}
            {{- if .Values.fredApiSecret.create }}
            - name: FRED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fredApiSecret.name }}
                  key: FRED_API_KEY
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis:6379"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
