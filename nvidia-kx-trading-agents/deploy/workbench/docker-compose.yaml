services:
  kxta-instruct-llm:
    container_name: kxta-instruct-llm
    image: ${INSTRUCT_LLM_IMAGE:-nvcr.io/nim/meta/llama-3.3-70b-instruct:1.15.5}
    volumes:
    - ${MODEL_DIRECTORY:-/tmp}:/opt/nim/.cache
    user: "${USERID}"
    ports:
    - "8050:8000"
    expose:
    - "8050"
    environment:
      NGC_API_KEY: ${NVIDIA_API_KEY}
    shm_size: 20gb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # RAG uses 0,1 so we assign 2,3 to the LLM
              device_ids: ['${KXTA_LLM_MS_GPU_ID_0:-2}', '${KXTA_LLM_MS_GPU_ID_1:-3}']
              capabilities: [gpu] 
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/v1/health/ready')"]
      interval: 30s
      timeout: 20s
      retries: 100
    networks:
      - nvidia-rag
    profiles: ["kxta-gpu"]

  kxta-backend-no-gpu: &kxta-backend-no-gpu
    hostname: kxta-backend
    container_name: kxta-backend
    image: ${KXTA_BACKEND_IMAGE:-kxta-backend:local}
    build:
      context: ../../
      dockerfile: kxta/Dockerfile
    entrypoint: "/entrypoint.sh"
    ports:
      - "3838:3838"
    expose:
      - "3838"
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY:-this-is-a-test-key}
      KXTA_APPLY_GUARDRAIL: "false"
      OPENAI_API_KEY: ${NVIDIA_API_KEY:-your-nvidia-api-key}
      KXTA_HOSTED_NIMS: ${KXTA_HOSTED_NIMS:-true}
      # Required for rag middleware via fastapi extensions
      RAG_INGEST_URL: ${RAG_INGEST_URL:-http://ingestor-server:8082/v1}
      RAG_SERVER_URL: ${RAG_SERVER_URL:-http://rag-server:8081/v1}
    volumes:
      - ../../configs:/app/configs
    networks:
      - nvidia-rag
    profiles: ["kxta-no-gpu"]

  kxta-backend-gpu: 
    <<: *kxta-backend-no-gpu
    environment:
      KXTA_HOSTED_NIMS: ${KXTA_HOSTED_NIMS:-false}
    profiles: ["kxta-gpu"]
    
  kxta-frontend:
    container_name: kxta-frontend
    image: ${KXTA_FRONTEND_IMAGE:-kxta-frontend:local}
    ports:
      - "3000:3000"
    expose:
      - "3000"
    networks:
      - nvidia-rag
    environment:
      NVWB_TRIM_PREFIX: true
      INFERENCE_ORIGIN: ${INFERENCE_ORIGIN:-http://kxta-backend:3838}
    profiles: ["kxta-no-gpu", "kxta-gpu"]

  kxta-load-files:
    image: ${KXTA_LOAD_FILES_IMAGE:-kxta-load-files:local}
    environment:
      - RAG_INGEST_URL=http://${RAG_INGEST_URL:-ingestor-server}:8082/v1
      - PYTHONUNBUFFERED=1
    volumes:
      - /tmp:/tmp-data
    networks:
      - nvidia-rag
    profiles: ["load-default-files"]

# Use the nvidia-rag network created by the 
# RAG docker compose deployment
# If you are deploying RAG separately
# set external to false
networks:
  nvidia-rag:
    external: true
    name: nvidia-rag
