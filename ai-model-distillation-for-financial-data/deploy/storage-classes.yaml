# StorageClasses for Data Flywheel on EKS
# kdbx-storage is the cluster default (required by NeMo Bitnami PostgreSQL sub-charts)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: kdbx-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# Single-AZ StorageClass for NeMo Customizer training PVCs
# Restricted to the same AZ as GPU nodes so Volcano-scheduled training
# pods can always mount their PVCs.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: kdbx-storage-1f
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
allowedTopologies:
  - matchLabelExpressions:
      - key: topology.ebs.csi.aws.com/zone
        values:
          - us-west-2a
