# KDB.AI License Secret
# Holds the base64-encoded KDB.AI license from KX.  Only used when running
# kdbai itself, so we keep the kdbai.enabled gate.
{{- if and .Values.kdbai.enabled .Values.kdbai.licenseSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kdbai.licenseSecret.name }}
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: kdbai
type: Opaque
data:
  KDB_LICENSE_B64: {{ .Values.kdbai.licenseSecret.licenseB64 | b64enc | quote }}
{{- end }}
---
# KX Docker Registry Secret (portal.dl.kx.com)
# Needed by ANY backend that pulls the KX-fork rag-server / ingestor-server
# images — those live at portal.dl.kx.com regardless of which VDB is enabled.
# Used to gate this on `kdbai.enabled` which broke the kdbx path; the new
# gate fires whenever either VDB needs the KX-fork images.
{{- if and (or .Values.kdbai.enabled .Values.kdbx.enabled) .Values.kdbai.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kdbai.imagePullSecret.name }}
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"%s":{"username":"%s","password":"%s","email":"%s","auth":"%s"}}}` "portal.dl.kx.com" .Values.kdbai.imagePullSecret.email .Values.kdbai.imagePullSecret.token .Values.kdbai.imagePullSecret.email (printf "%s:%s" .Values.kdbai.imagePullSecret.email .Values.kdbai.imagePullSecret.token | b64enc) | b64enc | quote }}
{{- end }}
