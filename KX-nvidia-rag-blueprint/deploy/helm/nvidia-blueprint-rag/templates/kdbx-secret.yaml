{{- if .Values.kdbx.enabled }}
# KDB-X License Secret
{{- if .Values.kdbx.licenseSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kdbx.licenseSecret.name }}
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: kdbx
type: Opaque
data:
  # `KDB_LICENSE_B64` (env var consumer): the kdbx-init.q script decodes this
  # at startup, so the value stored in K8s must be double-b64-encoded — once
  # to satisfy the K8s Secret data spec, once to round-trip the license blob.
  KDB_LICENSE_B64: {{ .Values.kdbx.licenseSecret.licenseB64 | b64enc | quote }}
  # `kc.lic` (file-mount consumer): the rag-server + ingestor-server pods
  # mount this secret at /opt/kx-license/ so PyKX can pick up the license
  # via $QLIC/kc.lic.  Stored single-encoded — `licenseB64` is already the
  # base64 of the raw kc.lic, and K8s decodes one layer on mount, giving us
  # the raw binary license file as `kc.lic`.
  kc.lic: {{ .Values.kdbx.licenseSecret.licenseB64 | quote }}
  {{- if .Values.kdbx.licenseSecret.bearerToken }}
  # `KDB_BEARER_TOKEN` (env var consumer): kdbx-entrypoint.sh uses this to
  # download the cuVS module (and KDB-X itself if the image lacks q) at pod
  # startup. TEST DEPLOYS ONLY — never ship a runtime KX portal token in a
  # production artifact. Consumed as a plain env string, so single-b64 for the
  # K8s Secret data spec.
  KDB_BEARER_TOKEN: {{ .Values.kdbx.licenseSecret.bearerToken | b64enc | quote }}
  {{- end }}
{{- end }}
---
# KDB-X Docker Registry Secret
{{- if .Values.kdbx.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kdbx.imagePullSecret.name }}
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: kdbx
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"%s":{"username":"%s","password":"%s","auth":"%s"}}}` .Values.kdbx.imagePullSecret.registry .Values.kdbx.imagePullSecret.username .Values.kdbx.imagePullSecret.password (printf "%s:%s" .Values.kdbx.imagePullSecret.username .Values.kdbx.imagePullSecret.password | b64enc) | b64enc | quote }}
{{- end }}
{{- end }}
