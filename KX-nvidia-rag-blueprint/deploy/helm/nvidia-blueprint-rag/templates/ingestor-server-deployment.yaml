{{- $cfg := index .Values "ingestor-server" -}}
{{- if $cfg.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $cfg.appName }}
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
spec:
  replicas: {{ $cfg.replicaCount }}
  # ingestor-server uses a ReadWriteOnce PVC; RollingUpdate causes Multi-Attach
  # deadlock during helm upgrade. Recreate is correct for single-replica + RWO PVC.
  {{- if $cfg.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      app: {{ $cfg.appName }}
      app.kubernetes.io/component: ingestor-server
      {{- include "nvidia-blueprint-rag.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ $cfg.appName }}
        app.kubernetes.io/component: ingestor-server
        {{- include "nvidia-blueprint-rag.selectorLabels" . | nindent 8 }}
    spec:
      {{- $needsKdbai := and .Values.kdbai.enabled .Values.kdbai.imagePullSecret.name -}}
      {{- $needsKdbx  := and .Values.kdbx.enabled  .Values.kdbx.imagePullSecret.name -}}
      {{- if or $cfg.imagePullSecret.name $needsKdbai $needsKdbx }}
      imagePullSecrets:
        {{- if $cfg.imagePullSecret.name }}
        - name: {{ $cfg.imagePullSecret.name }}
        {{- end }}
        {{- if $needsKdbai }}
        - name: {{ .Values.kdbai.imagePullSecret.name }}
        {{- end }}
        {{- if $needsKdbx }}
        - name: {{ .Values.kdbx.imagePullSecret.name }}
        {{- end }}
      {{- end }}
      {{- if $cfg.nodeSelector }}
      nodeSelector:
{{ toYaml $cfg.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $cfg.affinity }}
      affinity:
{{ toYaml $cfg.affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $cfg.appName }}
          image: "{{ $cfg.image.repository }}:{{ $cfg.image.tag }}"
          imagePullPolicy: {{ $cfg.image.pullPolicy }}
          command:
          - "uvicorn"
          - "nvidia_rag.ingestor_server.server:app"
          - "--port"
          - "8082"
          - "--host"
          - "0.0.0.0"
          - "--workers"
          - "{{ $cfg.server.workers }}"
          ports:
            - containerPort: 8082
          env:
          {{- if $cfg.envVars }}
          {{- range $k, $v := $cfg.envVars }}
            - name: "{{ $k }}"
              value: "{{ $v }}"
          {{- end }}
          {{- end }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NGC_API_KEY
            - name: NGC_CLI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NGC_CLI_API_KEY
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ngcApiSecret.name }}
                  key: NVIDIA_API_KEY
            {{- if .Values.kdbx.enabled }}
            # PyKX picks up kc.lic from $QLIC — see comment in
            # deployment.yaml (rag-server).  Same license drives ingestor's
            # write_to_index over IPC.
            - name: QLIC
              value: {{ .Values.kdbx.licenseMountPath | default "/opt/kx-license" | quote }}
            {{- if .Values.kdbx.pykxUnlicensed }}
            - name: PYKX_UNLICENSED
              value: "1"
            {{- end }}
            {{- end }}
          {{- if $cfg.livenessProbe }}
          livenessProbe:
{{ toYaml $cfg.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if $cfg.readinessProbe }}
          readinessProbe:
{{ toYaml $cfg.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if $cfg.resources }}
          resources:
{{ toYaml $cfg.resources | nindent 12 }}
          {{- end }}
          {{- if or $cfg.persistence.enabled .Values.kdbx.enabled }}
          volumeMounts:
            {{- if $cfg.persistence.enabled }}
            - name: ingestor-server-data
              mountPath: {{ default $cfg.envVars.INGESTOR_SERVER_DATA_DIR $cfg.persistence.mountPath }}
              {{- if $cfg.persistence.subPath }}
              subPath: {{ $cfg.persistence.subPath }}
              {{- end }}
            {{- end }}
            {{- if .Values.kdbx.enabled }}
            - name: kdbx-license
              mountPath: {{ .Values.kdbx.licenseMountPath | default "/opt/kx-license" | quote }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or $cfg.persistence.enabled .Values.kdbx.enabled }}
      volumes:
        {{- if $cfg.persistence.enabled }}
        - name: ingestor-server-data
          {{- if $cfg.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $cfg.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ printf "%s-data" $cfg.appName }}
          {{- end }}
        {{- end }}
        {{- if .Values.kdbx.enabled }}
        - name: kdbx-license
          secret:
            secretName: {{ .Values.kdbx.licenseSecret.name }}
            items:
              - key: kc.lic
                path: kc.lic
        {{- end }}
      {{- end }}
{{- end }}