# -- NeMo Guardrails (orchestrator + safety NIMs)
# Disabled by default. When enabled, the chart deploys:
#   - guardrails orchestrator (port 7331)
#   - llama-3.1-nemoguard-8b-content-safety NIM (when contentSafety.enabled)
#   - llama-3.1-nemoguard-8b-topic-control NIM (when topicControl.enabled)
# rag-server picks it up via envVars.ENABLE_GUARDRAILS=True and NEMO_GUARDRAILS_URL.
# subsection: nemoGuardrails
nemoGuardrails:
  enabled: false

  orchestrator:
    image:
      repository: nvcr.io/nvidia/nemo-microservices/guardrails
      tag: "25.09"
      pullPolicy: IfNotPresent
    service:
      name: "nemo-guardrails"
      type: ClusterIP
      port: 7331
    # Default config_id picked when rag-server doesn't specify one
    defaultConfigId: "nemoguard"
    # URL of the main LLM the orchestrator hits when applying rails.
    # Leave empty to inherit from envVars.APP_LLM_SERVERURL (works for both
    # cloud integrate.api.nvidia.com and self-hosted nim-llm).
    nimEndpointUrl: ""
    # Probe tuning — orchestrator needs the safety NIMs to be ready first
    livenessProbe:
      httpGet: { path: /v1/health, port: 7331 }
      initialDelaySeconds: 60
      periodSeconds: 30
    readinessProbe:
      httpGet: { path: /v1/health, port: 7331 }
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 30
    resources:
      requests: { cpu: "500m", memory: "1Gi" }
      limits:   { cpu: "2",    memory: "4Gi" }

  # Content safety NIM (8B, ~16GB VRAM). Disable + set endpointUrl to use cloud.
  contentSafety:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-content-safety
      tag: "1.10.1"
      pullPolicy: IfNotPresent
    service:
      name: "nemoguard-content-safety"
      type: ClusterIP
      port: 8000
    modelName: "llama-3.1-nemoguard-8b-content-safety"
    # When contentSafety.enabled=false, set this to a cloud URL to keep guardrails working
    endpointUrl: ""
    # No memory limits — TRT-LLM engine compile of an 8B model peaks above 24Gi.
    # Matches the pattern used by the working NIM subcharts. Request just GPU.
    resources:
      requests: { nvidia.com/gpu: 1 }
      limits:   { nvidia.com/gpu: 1 }
    persistence:
      enabled: true
      size: 50Gi
      # Leave empty to use cluster default; set to "rag-storage" on EKS overlay
      storageClass: ""
    readinessProbe:
      httpGet: { path: /v1/health/ready, port: 8000 }
      initialDelaySeconds: 120
      periodSeconds: 15
      failureThreshold: 80

  # Topic control NIM (8B, ~16GB VRAM)
  topicControl:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-topic-control
      tag: "1.10.1"
      pullPolicy: IfNotPresent
    service:
      name: "nemoguard-topic-control"
      type: ClusterIP
      port: 8000
    modelName: "llama-3.1-nemoguard-8b-topic-control"
    endpointUrl: ""
    resources:
      requests: { nvidia.com/gpu: 1 }
      limits:   { nvidia.com/gpu: 1 }
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
    readinessProbe:
      httpGet: { path: /v1/health/ready, port: 8000 }
      initialDelaySeconds: 120
      periodSeconds: 15
      failureThreshold: 80

  # Jailbreak detection NIM (8B, ~16GB VRAM). Optional 3rd safety rail.
  # Default disabled (adds 1 GPU). Same pattern as contentSafety + topicControl.
  jailbreakDetect:
    enabled: false
    image:
      repository: nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-jailbreak-detect
      tag: "1.10.1"
      pullPolicy: IfNotPresent
    service:
      name: "nemoguard-jailbreak"
      type: ClusterIP
      port: 8000
    modelName: "llama-3.1-nemoguard-8b-jailbreak-detect"
    endpointUrl: ""
    resources:
      requests: { nvidia.com/gpu: 1 }
      limits:   { nvidia.com/gpu: 1 }
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
    readinessProbe:
      httpGet: { path: /v1/health/ready, port: 8000 }
      initialDelaySeconds: 120
      periodSeconds: 15
      failureThreshold: 80

  # Rails config sources (in priority order):
  #   1. files/guardrails/<configId>/<filename>  — verbatim upstream defaults
  #      (config.yml + prompts.yml for "nemoguard" and "nemoguard_cloud").
  #      The chart auto-substitutes service URLs to match this chart's services.
  #   2. configStore.configs[<configId>][<filename>] = <yaml content>  — inline
  #      overrides that WIN over filesystem defaults with the same key.
  configStore:
    configs: {}
      # Example override (uncomment to customize):
      # nemoguard:
      #   config.yml: |
      #     models: [...]
      #     rails: [...]

# -- NV-Ingest dependency configuration
