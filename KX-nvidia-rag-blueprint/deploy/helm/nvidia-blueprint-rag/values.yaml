# -- Global chart configuration
nameOverride: ""
fullnameOverride: "rag-server"
# subsection: rag-server
# RAG Orchestrator Service
# -- Kubernetes scheduling
nodeSelector: {}
affinity: {}
tolerations: []

# -- Common service account for rag-server
serviceAccount:
  create: true
  name: ""
  automount: true
  annotations: {}

# -- Replicas for rag-server
replicaCount: 1

# -- Namespace for documentation/reference; not actively used in templates
namespace: "nv-nvidia-blueprint-rag"

# -- Image pull secret for all images used by this chart
imagePullSecret:
  name: "ngc-secret"
  registry: "nvcr.io"
  username: "$oauthtoken"
  password: ""
  create: true

# -- Secret containing API keys for NVIDIA NGC model registry
ngcApiSecret:
  name: "ngc-api"
  password: ""
  create: true

# -- RAG server container image
image:
  repository: portal.dl.kx.com/rag-server-kdbai
  tag: "2.4.0"
  pullPolicy: Always

# -- RAG server service configuration
service:
  type: ClusterIP
  port: 8081

# -- RAG server container resources
resources:
  limits:
    memory: "64Gi"
  requests:
    memory: "8Gi"

# -- Probes for rag-server (optional)
livenessProbe:
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- RAG server runtime configuration
server:
  workers: 8

# -- Enable/disable creation of prompt ConfigMap
promptConfig:
  enabled: true

# -- Environment variables for rag-server
envVars:
  EXAMPLE_PATH: "./nvidia_rag/rag_server"
  PROMPT_CONFIG_FILE: "/prompt.yaml"
  PROMETHEUS_MULTIPROC_DIR: "/tmp-data/prom_data"

  ##===MINIO specific configurations used to store multimodal base64 content===
  MINIO_ENDPOINT: "rag-minio:9000"
  MINIO_ACCESSKEY: "minioadmin"
  MINIO_SECRETKEY: "minioadmin"

  ##===Vector DB specific configurations===
  # KX fork — KDB-X (default) and KDB.AI; Milvus and Elasticsearch are not supported.
  APP_VECTORSTORE_URL: "http://kdbx:5000"
  APP_VECTORSTORE_NAME: "kdbx"
  # Index type: cagra (cuVS GPU, default), hnsw (CPU), flat (CPU)
  APP_VECTORSTORE_INDEXTYPE: "cagra"
  # Type of vectordb search to be used
  APP_VECTORSTORE_SEARCHTYPE: "dense"
  # Boolean to control GPU search/indexing
  APP_VECTORSTORE_ENABLEGPUSEARCH: "True"
  APP_VECTORSTORE_ENABLEGPUINDEX: "True"
  # ef: Parameter controlling query time/accuracy trade-off. Higher ef leads to more accurate but slower search.
  APP_VECTORSTORE_EF: "100"

  ##===KDB.AI specific configurations===
  # KDB.AI database name
  KDBAI_DATABASE: "default"
  # KDB.AI index type: flat, hnsw, ivf, ivfpq, cagra (GPU)
  KDBAI_INDEX_TYPE: "cagra"
  # KDB.AI API key (optional for self-hosted deployments)
  KDBAI_API_KEY: ""
  # CAGRA batch insert mode (false = normal batching, fixed in cuVS 1.8.2+)
  KDBAI_CAGRA_SINGLE_BATCH: "false"

  # vectorstore collection name to store embeddings
  COLLECTION_NAME: "multimodal_data"
  APP_RETRIEVER_SCORETHRESHOLD: "0.25"
  # Top K from vector DB, which goes as input to reranker model - not applicable if ENABLE_RERANKER is set to False
  VECTOR_DB_TOPK: "100"
  # Number of document chunks to insert in LLM prompt
  APP_RETRIEVER_TOPK: "10"

  ##===LLM Model specific configurations===
  APP_LLM_MODELNAME: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  # URL on which LLM model is hosted. If "", Nvidia hosted API is used
  APP_LLM_SERVERURL: "nim-llm:8000"
  # LLM model parameters
  LLM_MAX_TOKENS: "32768"
  LLM_TEMPERATURE: "0"
  LLM_TOP_P: "1.0"

  ##===Query Rewriter Model specific configurations===
  APP_QUERYREWRITER_MODELNAME: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  # URL on which query rewriter model is hosted. If "", Nvidia hosted API is used
  APP_QUERYREWRITER_SERVERURL: "nim-llm:8000"

  ##===Filter Expression Generator Model specific configurations===
  APP_FILTEREXPRESSIONGENERATOR_MODELNAME: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  # URL on which filter expression generator model is hosted. If "", Nvidia hosted API is used
  APP_FILTEREXPRESSIONGENERATOR_SERVERURL: "nim-llm:8000"
  # enable filter expression generator for natural language to filter expression conversion
  ENABLE_FILTER_GENERATOR: "False"

  ##===Embedding Model specific configurations===
  # URL on which embedding model is hosted. If "", Nvidia hosted API is used
  APP_EMBEDDINGS_SERVERURL: "nemoretriever-embedding-ms:8000"
  APP_EMBEDDINGS_MODELNAME: "nvidia/llama-nemotron-embed-1b-v2"

  ##===Reranking Model specific configurations===
  # URL on which ranking model is hosted. If "", Nvidia hosted API is used
  APP_RANKING_SERVERURL: "nemoretriever-ranking-ms:8000"
  APP_RANKING_MODELNAME: "nvidia/llama-nemotron-rerank-1b-v2"
  ENABLE_RERANKER: "True"
  # Default confidence threshold for filtering documents by reranker relevance scores (0.0 to 1.0)
  RERANKER_CONFIDENCE_THRESHOLD: "0.0"

  ##===VLM Model specific configurations===
  ENABLE_VLM_INFERENCE: "false"
  # Reasoning gate on VLM response
  ENABLE_VLM_RESPONSE_REASONING: "false"
  # Max images sent to VLM per request (query + context)
  APP_VLM_MAX_TOTAL_IMAGES: "4"
  # Use VLM for final response generation
  APP_VLM_RESPONSE_AS_FINAL_ANSWER: "false"
  # Max number of query images to include in VLM input
  APP_VLM_MAX_QUERY_IMAGES: "1"
  # Max number of context images to include in VLM input
  APP_VLM_MAX_CONTEXT_IMAGES: "1"
  APP_VLM_SERVERURL: "http://nim-vlm:8000/v1"
  APP_VLM_MODELNAME: "nvidia/nemotron-nano-12b-v2-vl"

  # === Text Splitter ===
  APP_TEXTSPLITTER_CHUNKSIZE: "2000"
  APP_TEXTSPLITTER_CHUNKOVERLAP: "200"

  # === General ===
  # Choose whether to enable citations in the response
  ENABLE_CITATIONS: "True"
  # Choose whether to enable/disable guardrails
  ENABLE_GUARDRAILS: "False"
  # Log level for server, supported level NOTSET, DEBUG, INFO, WARN, ERROR, CRITICAL
  LOGLEVEL: "INFO"
  # enable multi-turn conversation in the rag chain - this controls conversation history usage
  # while doing query rewriting and in LLM prompt
  ENABLE_MULTITURN: "True"
  # enable query rewriting for multiturn conversation in the rag chain.
  # This will improve accuracy of the retrieiver pipeline but increase latency due to an additional LLM call
  ENABLE_QUERYREWRITER: "False"
  # number of last n chat messages to consider from the provided conversation history
  CONVERSATION_HISTORY: "5"

  # === Tracing ===
  APP_TRACING_ENABLED: "False"
  # HTTP endpoint
  APP_TRACING_OTLPHTTPENDPOINT: "http://rag-opentelemetry-collector:4318/v1/traces"
  # GRPC endpoint
  APP_TRACING_OTLPGRPCENDPOINT: "grpc://rag-opentelemetry-collector:4317"

  # === Reflection ===
  # enable reflection (context relevance and response groundedness checking) in the rag chain
  ENABLE_REFLECTION: "false"
  # Maximum number of context relevance loop iterations
  MAX_REFLECTION_LOOP: "3"
  # Minimum relevance score threshold (0-2)
  CONTEXT_RELEVANCE_THRESHOLD: "1"
  # Minimum groundedness score threshold (0-2)
  RESPONSE_GROUNDEDNESS_THRESHOLD: "1"
  # reflection llm
  REFLECTION_LLM: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  # reflection llm server url. If "", Nvidia hosted API is used
  REFLECTION_LLM_SERVERURL: "nim-llm:8000"

  # Choose whether to enable source metadata in document content during generation
  ENABLE_SOURCE_METADATA: "true"

  # Whether to filter content within <think></think> tags in model responses
  FILTER_THINK_TOKENS: "true"

  NEMO_GUARDRAILS_URL: "nemo-guardrails:7331"

  # enable iterative query decomposition
  ENABLE_QUERY_DECOMPOSITION: "false"
  # maximum recursion depth for iterative query decomposition
  MAX_RECURSION_DEPTH: "3"

# -- Ingestor Server
# subsection: ingestor-server
# Ingestor API Service
ingestor-server:
  enabled: true
  appName: ingestor-server

  # -- Pod scheduling
  nodeSelector: {}
  affinity: {}
  tolerations: []

  replicaCount: 1

  imagePullSecret:
    create: false
    name: "ngc-secret"
    registry: "nvcr.io"
    username: "$oauthtoken"
    password: ""

  image:
    repository: portal.dl.kx.com/ingestor-server-kdbai
    tag: "2.4.0"
    pullPolicy: Always

  # -- Service config for ingestor-server
  service:
    type: ClusterIP
    port: 8082

  server:
    workers: 1

  # -- Probes for ingestor-server (optional)
  livenessProbe: {}
  readinessProbe: {}

  resources:
    limits:
      memory: "25Gi"
    requests:
      memory: "25Gi"

  envVars:
    # Path to example directory relative to repo root
    EXAMPLE_PATH: "src/nvidia_rag/ingestor_server"
    # Absolute path to custom prompt.yaml file
    PROMPT_CONFIG_FILE: "/prompt.yaml"
    # === Vector Store Configurations === (KX fork — KDB-X default)
    APP_VECTORSTORE_URL: "http://kdbx:5000"
    APP_VECTORSTORE_NAME: "kdbx"
    APP_VECTORSTORE_SEARCHTYPE: "dense"
    APP_VECTORSTORE_ENABLEGPUINDEX: "True"
    APP_VECTORSTORE_ENABLEGPUSEARCH: "True"
    COLLECTION_NAME: "multimodal_data"

    # === KDB.AI specific configurations ===
    KDBAI_DATABASE: "default"
    KDBAI_INDEX_TYPE: "cagra"
    KDBAI_API_KEY: ""
    KDBAI_CAGRA_SINGLE_BATCH: "false"

    # === MinIO Configurations ===
    MINIO_ENDPOINT: "rag-minio:9000"
    MINIO_ACCESSKEY: "minioadmin"
    MINIO_SECRETKEY: "minioadmin"

    # === Embeddings Configurations ===
    APP_EMBEDDINGS_SERVERURL: "nemoretriever-embedding-ms:8000"
    APP_EMBEDDINGS_MODELNAME: "nvidia/llama-nemotron-embed-1b-v2"
    APP_EMBEDDINGS_DIMENSIONS: "2048"

    # === NV-Ingest Configurations ===
    APP_NVINGEST_MESSAGECLIENTHOSTNAME: "rag-nv-ingest"
    APP_NVINGEST_MESSAGECLIENTPORT: "7670"

    # === NV-Ingest extraction configurations ===
    APP_NVINGEST_PDFEXTRACTMETHOD: "None"  # Method used for text extraction from "None", "pdfium", "nemoretriever_parse"
    APP_NVINGEST_EXTRACTTEXT: "True"  # Enable text extraction
    APP_NVINGEST_EXTRACTINFOGRAPHICS: "False"  # Enable infographic extraction
    APP_NVINGEST_EXTRACTTABLES: "True"  # Enable table extraction
    APP_NVINGEST_EXTRACTCHARTS: "True"  # Enable chart extraction
    APP_NVINGEST_EXTRACTIMAGES: "False"  # Enable image extraction
    APP_NVINGEST_EXTRACTPAGEASIMAGE: "False"  # Extracts each page as image if enabled
    APP_NVINGEST_STRUCTURED_ELEMENTS_MODALITY: ""  # "image", "text_image"
    APP_NVINGEST_IMAGE_ELEMENTS_MODALITY: ""  # "image"
    APP_NVINGEST_TEXTDEPTH: "page"  # Extract text by "page" or "document"

    # === NV-Ingest caption configurations ===
    APP_NVINGEST_CAPTIONMODELNAME: "nvidia/nemotron-nano-12b-v2-vl"  # Model name for captioning
    APP_NVINGEST_CAPTIONENDPOINTURL: ""  # Endpoint URL for captioning model

    # === NV-Ingest save to disk configurations ===
    APP_NVINGEST_SAVETODISK: "False"
    NVINGEST_MINIO_BUCKET: "nv-ingest"

    # === General ===
    # Summary Model Configurations
    SUMMARY_LLM: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
    SUMMARY_LLM_SERVERURL: "nim-llm:8000"
    SUMMARY_LLM_MAX_CHUNK_LENGTH: "50000"
    SUMMARY_CHUNK_OVERLAP: "200"

    # === General ===
    ENABLE_CITATIONS: "True"
    LOGLEVEL: "INFO"

    # === NV-Ingest splitting configurations ===
    APP_NVINGEST_CHUNKSIZE: "512"  # Size of chunks for splitting
    APP_NVINGEST_CHUNKOVERLAP: "150"  # Overlap size for chunks
    APP_NVINGEST_ENABLEPDFSPLITTER: "True"  # Enable PDF splitter
    APP_NVINGEST_SEGMENTAUDIO: "False"  # Enable audio segmentation for NV Ingest

    # === Redis configurations ===
    REDIS_HOST: "rag-redis-master"
    REDIS_PORT: "6379"
    REDIS_DB: "0"

    # === Bulk upload to MinIO ===
    ENABLE_MINIO_BULK_UPLOAD: "True"
    TEMP_DIR: "/tmp-data"
    INGESTOR_SERVER_DATA_DIR: "/data/"

    # === NV-Ingest Batch Mode Configurations ===
    NV_INGEST_FILES_PER_BATCH: "16"
    NV_INGEST_CONCURRENT_BATCHES: "4"

  # -- Persistent storage for ingestor-server data directory
  # If enabled, mounts a PVC at the path used by INGESTOR_SERVER_DATA_DIR
  persistence:
    enabled: true
    # If set, use an existing PVC by name; when empty and enabled, a PVC is created
    existingClaim: ""
    # StorageClass to use for the PVC; keep empty to use the cluster default
    storageClass: ""
    # Access modes for the PVC
    accessModes:
      - ReadWriteOnce
    # Requested size for the PVC
    size: 50Gi
    # Mount path inside the container; defaults to envVars.INGESTOR_SERVER_DATA_DIR if empty
    mountPath: "/data/"
    # Optional subPath within the PVC
    subPath: ""

# -- Frontend
# subsection: frontend
# rag frontend Frontend
frontend:
  enabled: true
  appName: "rag-frontend"

  replicaCount: 1

  image:
    repository: nvcr.io/nvidia/blueprint/rag-frontend
    pullPolicy: IfNotPresent
    tag: "2.3.0"

  imagePullSecret:
    name: "ngc-secret"
    registry: "nvcr.io"
    username: "$oauthtoken"
    password: ""

  service:
    type: NodePort
    port: 3000

  # -- Probes for frontend (optional)
  livenessProbe: {}
  readinessProbe: {}

  envVars:
    # Runtime environment variables for Vite frontend
    # Note: Model names are now managed by frontend settings store
    - name: VITE_API_CHAT_URL
      value: "http://rag-server:8081/v1"
    - name: VITE_API_VDB_URL
      value: "http://ingestor-server:8082/v1"

# -- KDB.AI Vector Database Configuration (Self-Hosted)
# subsection: kdbai
# Reference: https://docs.kx.com/1.7/KDB_AI/Get_Started/kdb-ai-server-setup.htm
#
# Prerequisites:
#   1. Obtain a KDB.AI license from KX (https://kx.com) - valid for 90 days
#   2. Get your Docker registry credentials from the KX welcome email
#   3. Pass the license and registry credentials via Helm:
#        --set kdbai.licenseSecret.create=true \
#        --set kdbai.licenseSecret.licenseB64="${KDB_LICENSE_B64}" \
#        --set kdbai.imagePullSecret.create=true \
#        --set kdbai.imagePullSecret.email="${KDBAI_REGISTRY_EMAIL}" \
#        --set kdbai.imagePullSecret.token="${KDBAI_REGISTRY_TOKEN}"
#
# KX fork: the default backend is KDB-X (kdbx.enabled). Set kdbai.enabled=true
# (and kdbx.enabled=false) to use KDB.AI instead — they are mutually exclusive.
# There is no Milvus / Elasticsearch path in the chart.
kdbai:
  enabled: false
  fullnameOverride: kdbai

  # -- KDB.AI image configuration (cuVS GPU-accelerated)
  # Requires authentication with KX Docker registry (portal.dl.kx.com)
  image:
    registry: portal.dl.kx.com
    repository: kdbai-db-cuvs
    tag: "1.8.2"
    pullPolicy: IfNotPresent

  # -- Image pull secret for KX Docker registry
  # Create using: kubectl create secret docker-registry kdbai-registry-secret \
  #   --docker-server=portal.dl.kx.com \
  #   --docker-username=<your-email> \
  #   --docker-password=<bearer-token>
  imagePullSecret:
    name: "kdbai-registry-secret"
    # Set to true to create the secret from values below
    create: false
    # Required if create: true
    email: ""
    token: ""

  # -- KDB.AI license secret
  # Create using: kubectl create secret generic kdbai-license-secret \
  #   --from-literal=KDB_LICENSE_B64=<your-base64-license>
  licenseSecret:
    name: "kdbai-license-secret"
    # Set to true to create the secret from values below
    create: false
    # Required if create: true - base64-encoded KDB.AI license string
    licenseB64: ""

  # -- KDB.AI service configuration
  service:
    type: ClusterIP
    # REST API port (health checks, management)
    restPort: 8081
    # Client port (vector operations via kdbai-client SDK)
    clientPort: 8082

  # -- KDB.AI server resources
  resources:
    limits:
      memory: "16Gi"
      cpu: "8"
    requests:
      memory: "4Gi"
      cpu: "2"

  # -- KDB.AI server configuration
  config:
    # Number of threads for KDB.AI server (Standard Edition limited to 24 cores)
    threads: 8
    # Data directory inside the container
    dataDir: "/tmp/kx/data/vdb"

  # -- Persistence configuration for KDB.AI data
  persistence:
    enabled: true
    # StorageClass to use; leave empty to use cluster default
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 50Gi

  # -- Optional StorageClass managed by the chart (used on EKS to provide a
  # WaitForFirstConsumer SC). Disabled by default; the EKS overlay enables it.
  storageClass:
    create: false
    name: "rag-storage"
    # When true, the SC gets the storageclass.kubernetes.io/is-default-class
    # annotation. Only set true if the cluster has NO existing default SC, as
    # K8s rejects PVCs when multiple defaults exist.
    isDefault: false
    volumeBindingMode: WaitForFirstConsumer
    reclaimPolicy: Delete
    allowVolumeExpansion: true
    provisioner: "ebs.csi.aws.com"
    parameters:
      type: gp3

  # -- Probes for KDB.AI server
  livenessProbe:
    httpGet:
      path: /api/v2/ready
      port: 8081
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    httpGet:
      path: /api/v2/ready
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # -- Pod scheduling
  nodeSelector: {}
  affinity: {}
  tolerations: []

# -- KDB-X Vector Database Configuration (Self-Hosted)
# subsection: kdbx
# KDB-X vector database — DEFAULT backend for this fork (CAGRA/cuVS GPU by default).
# Mutually exclusive with kdbai.enabled — _helpers.tpl enforces this.
# NOTE: a bare `helm install` needs prep — build/push the kdbx images (no public
# image yet), provide a KDB-X license (+ bearer token for the cuVS download), and
# a GPU node (driver >=580). See docs/eks-kdbx-cuvs-setup.md.
kdbx:
  enabled: true
  fullnameOverride: kdbx

  # Restrict q IPC ingress to the rag-server + ingestor pods (TODO 3.1).
  # q IPC is unauthenticated and code-execution-equivalent, so keep this on.
  # Requires a CNI that enforces NetworkPolicy (on EKS the stock VPC CNI needs
  # its network-policy agent enabled; Calico/Cilium enforce natively) — with a
  # non-enforcing CNI the object is accepted but inert (harmless).
  networkPolicy:
    enabled: true
    port: 5000  # must match the kdbx listen port / Service targetPort

  image:
    # Build with deploy/helm/nvidia-blueprint-rag/files/kdbx/Dockerfile.kdbx
    # and push to your own registry.
    repository: ""  # e.g., "123456789012.dkr.ecr.us-west-2.amazonaws.com/kdbx-rag"
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  imagePullSecret:
    name: "kdbx-registry-secret"
    create: false
    # If create: true, supply:
    # registry: ""
    # username: ""
    # password: ""

  licenseSecret:
    name: "kdbx-license-secret"
    create: false
    # If create: true:
    # licenseB64: ""  # base64-encoded KDB-X license
    # bearerToken: "" # KX portal OAuth token — TEST DEPLOYS ONLY, and only when
    #                 # useCuvs=true. The entrypoint uses it to download the cuVS
    #                 # module (and KDB-X itself if the image lacks q) at runtime.
    #                 # Stored under the key KDB_BEARER_TOKEN. Leave empty if the
    #                 # image already bundles cuVS or you don't need GPU.

  indexType: "cagra"
  useCuvs: true

  # -- GPU scheduling for the cuVS/CAGRA test deploy. Only applied when
  # useCuvs=true. The repo's kdbx pod is TEST-ONLY scaffolding; production
  # KDB-X is customer-managed (see docs/change-vectordb-kdbx.md). The cuVS
  # module + CUDA libs are installed at pod startup by kdbx-entrypoint.sh
  # (no maintained GPU image), so the node only needs a host driver >=580 and
  # the NVIDIA device plugin.
  gpu:
    # Number of GPUs to request (nvidia.com/gpu limit). CAGRA uses one.
    count: 1
    # Pin the GPU arch — the persisted .cagra index blob is arch-coupled, so a
    # Recreate-strategy PVC must reattach to the same arch. Match your nodes.
    nodeSelector: {}
    #   node.kubernetes.io/instance-type: g5.2xlarge
    tolerations: []
    #   - key: nvidia.com/gpu
    #     operator: Exists
    #     effect: NoSchedule

  # -- Startup grace (seconds) for the GPU liveness probe (WS-SAFETY). Only used
  # when useCuvs=true. Must comfortably exceed the at-pod-start cuVS install
  # (install_deps.sh pulls ~GBs of CUDA) PLUS the first CAGRA build, since both
  # block q's single thread and a liveness timeout would kill -> crashloop the
  # pod. 10 min is generous for a test deploy on a normal network.
  cuvsStartupSeconds: 600

  # -- CAGRA persistence-safety knobs (WS-SAFETY). Only applied when useCuvs=true.
  cagra:
    # Kill-switch: never read a persisted .cagra blob, always rebuild from the
    # vector table. Escape hatch if a blob ever fatally faults q on .read (a
    # hard fault q cannot trap, which would otherwise crashloop the pod).
    skipPersistedRead: false
    # Optional cuVS/CUDA version tag folded into the per-collection .cagra
    # env-stamp (alongside the GPU arch/driver from nvidia-smi). Set it to your
    # cuVS module version (e.g. "25.10") so a module/version bump invalidates
    # persisted blobs and forces a clean rebuild instead of a risky cross-version
    # read. Empty => arch+driver stamping only.
    cuvsStamp: ""

  # -- HNSW index tuning (server-side, read by kdbx-init.q at startup).
  # All optional; omitted keys fall back to the q defaults shown here.
  hnsw:
    # Distance metric for all .ai.hnsw calls: L2 (default) or CS (cosine).
    # build and search always use this same value. Use CS for cosine-style
    # retrieval with L2-normalized embeddings.
    metric: "L2"
    # Graph connectivity (higher = better recall, more memory/build time).
    m: 32
    # ef used when building/extending the graph on insert.
    efConstruction: 64
    # ef used at query time — tune independently of efConstruction; raise for
    # higher recall at some latency cost.
    efSearch: 64

  # -- PyKX license mount for the rag-server + ingestor-server pods.
  # The chart mounts `kdbx.licenseSecret` at `licenseMountPath` and sets QLIC
  # to that dir, so PyKX has a `kc.lic` to pick up.
  #
  # `pykxUnlicensed: true` (the safe default) forces PYKX_UNLICENSED=1 on the
  # client pods.  PyKX then runs in IPC-only mode and our adapter sends all
  # data over the wire as q strings — that path is what we validated
  # end-to-end on EKS.  The license is still mounted so it's available if
  # PyKX one day accepts it, but PyKX skips license detection at this level.
  #
  # Flip to `false` to try licensed mode — works only if PyKX's bundled q
  # accepts your kc.lic format.  KDB-X CE licenses are NOT currently
  # accepted by PyKX 3.1.x's bundled q (signed for a newer kdb+ than what
  # PyKX ships).  See docs/change-vectordb-kdbx.md "Troubleshooting".
  licenseMountPath: "/opt/kx-license"
  pykxUnlicensed: true

  service:
    type: ClusterIP
    port: 5000

  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      memory: "16Gi"

  persistence:
    enabled: true
    size: 50Gi
    storageClass: "rag-storage"

  # q is single-threaded; the `hopen` in the exec healthcheck can transiently
  # fail with 'conn reset by peer' while a heavy operation (big insert, HNSW
  # search, rehydrate) holds the main thread.  We don't want the kubelet to
  # kill a stateful pod over a transient busy window — that churns the data
  # dir and breaks in-flight requests.  Generous timeout + high
  # failureThreshold gives the pod ~5 min of cover before declaring it dead.
  livenessProbe:
    exec:
      command: ["q", "/opt/kx/conf/healthcheck.q"]
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10

  readinessProbe:
    tcpSocket:
      port: 5000
    initialDelaySeconds: 20
    periodSeconds: 10

# -- Standalone MinIO Object Storage
# subsection: minio
# MinIO is required for storing multimodal content (images extracted from documents).
# Always enabled in this KDB.AI-only fork (Milvus's bundled MinIO is no longer in scope).
minio:
  enabled: true
  fullnameOverride: "rag-minio"

  # -- MinIO image configuration (official minio/minio image)
  image:
    repository: minio/minio
    tag: "RELEASE.2025-09-07T16-13-09Z"
    pullPolicy: IfNotPresent

  # -- MinIO authentication
  auth:
    rootUser: "minioadmin"
    rootPassword: "minioadmin"

  # -- Default bucket to create
  defaultBuckets: "nv-ingest"

  # -- Persistence configuration
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""

  # -- Resource limits
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"

  # -- Service configuration
  service:
    type: ClusterIP

# -- Observability
# subsection: serviceMonitor
serviceMonitor:
  enabled: false

# subsection: opentelemetry-collector
opentelemetry-collector:
  enabled: false
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.131.0"
  command:
    name: otelcol-contrib
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: '${env:MY_POD_IP}:4317'
          http:
            cors:
              allowed_origins:
                - "*"
    exporters:
      # NOTE: Prior to v0.86.0 use `logging` instead of `debug`.
      zipkin:
        endpoint: "http://rag-zipkin:9411/api/v2/spans"
      debug:
        verbosity: detailed
      prometheus:
        endpoint: ${env:MY_POD_IP}:8889
    extensions:
      health_check: {}
      zpages:
        endpoint: 0.0.0.0:55679
    processors:
      batch: {}
      tail_sampling:
        # filter out health checks
        # https://github.com/open-telemetry/opentelemetry-collector/issues/2310#issuecomment-1268157484
        policies:
          - name: drop_noisy_traces_url
            type: string_attribute
            string_attribute:
              key: http.target
              values:
                - \/health
              enabled_regex_matching: true
              invert_match: true
      transform:
        trace_statements:
          - context: span
            statements:
              - set(status.code, 1) where attributes["http.path"] == "/health"

              # after the http target has been anonymized, replace other aspects of the span
              - replace_match(attributes["http.route"], "/v1", attributes["http.target"]) where attributes["http.target"] != nil

              # replace the title of the span with the route to be more descriptive
              - replace_pattern(name, "/v1", attributes["http.route"]) where attributes["http.route"] != nil

              # set the route to equal the URL if it's nondescriptive (for the embedding case)
              - set(name, Concat([name, attributes["http.url"]], " ")) where name == "POST"
    service:
      extensions: [zpages, health_check]
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug, zipkin]
          processors: [tail_sampling, transform]
        metrics:
          exporters:
            - debug
            - prometheus
          processors:
            - memory_limiter
            - batch
          receivers:
            - otlp
            - prometheus
        logs:
          receivers: [otlp]
          exporters: [debug]
          processors: [batch]
  ports:
    metrics:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP

# subsection: zipkin
zipkin:
  enabled: false

# subsection: kube-prometheus-stack
kube-prometheus-stack:
  enabled: false
  prometheus:
    serviceMonitor:
      interval: "1s"
    prometheusSpec:
      scrapeInterval: "1s"
      evaluationInterval: "1s"
      additionalScrapeConfigs:
        - job_name: rag-app
          scrape_interval: 5s
          metrics_path: /metrics
          static_configs:
            - targets:
                # If the app is in another namespace, use rag-server.<namespace>.svc:8081
                - rag-server:8081
  grafana:
    adminUser: admin
    adminPassword: "admin"

# -- NIMs (dependencies) configuration
# subsection: nim-llm
# NIM LLM
nim-llm:
  enabled: true
  service:
    name: "nim-llm"
  image:
    repository: nvcr.io/nim/nvidia/llama-3.3-nemotron-super-49b-v1.5
    pullPolicy: IfNotPresent
    tag: "1.15.5"
  resources:
    # FP8 single GPU (TP1): FP8 (~49GB) fits one 96GB RTX PRO 6000 Blackwell.
    # 1 GPU forces FP8 — bf16 (~98GB) cannot fit, so NIM auto-selects the FP8 TP1
    # profile. For bf16 tensor parallelism, set both to 2 and pin a tp2 profile below.
    limits:
      nvidia.com/gpu: 1
    requests:
      nvidia.com/gpu: 1

  env:
    - name: NIM_MODEL_PROFILE
      # Empty = auto-select. On a single 96GB GPU this resolves to FP8 TP1
      # (tensorrt_llm-rtx6000_blackwell_sv-fp8-tp1-...). To pin explicitly, run
      # `list-model-profiles` against tag 1.15.5 on your GPU and paste the FP8 ID.
      value: ""
  model:
    ngcAPIKey: ""
    name: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
    hfTokenSecret: ""

